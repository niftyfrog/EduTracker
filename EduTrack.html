<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — 新人教育管理</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f8;
  color: #1a1a1a;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 99px; }
* { scrollbar-width: thin; scrollbar-color: #ccc transparent; }
input, select, textarea, button { font-family: inherit; color: inherit; }
input::placeholder, textarea::placeholder { color: #bbb; }
input:focus, textarea:focus, select:focus { outline: none; border-color: rgba(145,22,25,0.4) !important; }
a { color: #911619; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ① フォント詰め */
h1, h2, h3 {
  font-stretch: 96%;
  line-height: 1.15;
  letter-spacing: -0.025em;
  text-wrap: pretty;
}
p, li { line-height: 1.7; }

/* ④ Reveal アニメーション */
@keyframes reveal {
  from { opacity: 0; filter: blur(10px); transform: translateY(7px); }
  to   { opacity: 1; filter: blur(0px);  transform: translateY(0);   }
}
.reveal {
  animation: reveal 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.reveal-d1 { animation-delay: 0.05s; }
.reveal-d2 { animation-delay: 0.12s; }
.reveal-d3 { animation-delay: 0.20s; }
.reveal-d4 { animation-delay: 0.28s; }

/* Tweaks panel */
#tweaks-panel {
  display: none;
  position: fixed; bottom: 20px; right: 20px;
  background: #fff; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; padding: 16px; width: 240px;
  z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
#tweaks-panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
.tweak-row { margin-bottom: 10px; }
.tweak-row label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.tweak-row select, .tweak-row input[type=range] { width: 100%; padding: 6px 8px; background: #f5f5f5; border: 1px solid rgba(0,0,0,0.09); border-radius: 6px; color: #1a1a1a; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>
<div id="root" style="height:100%;position:relative;z-index:1;"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <label>サイドバー幅</label>
    <select onchange="applyTweak('sidebarWidth', this.value)">
      <option value="220">スリム (220px)</option>
      <option value="240" selected>標準 (240px)</option>
      <option value="260">ワイド (260px)</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>アクセントカラー</label>
    <select onchange="applyTweak('accent', this.value)">
      <option value="#911619" selected>レッド (#911619)</option>
      <option value="#00e599">グリーン (Neon)</option>
      <option value="#4d9fff">ブルー</option>
      <option value="#a78bfa">パープル</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>カード角丸</label>
    <select onchange="applyTweak('radius', this.value)">
      <option value="4">シャープ (4px)</option>
      <option value="8">標準 (8px)</option>
      <option value="12" selected>ラウンド (12px)</option>
    </select>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script src="app/data.js"></script>
<script type="text/babel" src="app/famap.jsx"></script>
<script type="text/babel" src="app/aigenerate.jsx"></script>
<script type="text/babel" src="app/screens.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

<script>
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

const TWEAK_DEFAULTS = { accent: '#911619', sidebarWidth: '240', radius: '12' };

function applyTweak(key, value) {
  if (key === 'accent') {
    document.documentElement.style.setProperty('--accent', value);
    window.__setAccent && window.__setAccent(value);
  }
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { ...TWEAK_DEFAULTS, [key]: value } }, '*');
}

// Apply defaults
document.documentElement.style.setProperty('--accent', TWEAK_DEFAULTS.accent);
</script>
</body>
</html>
